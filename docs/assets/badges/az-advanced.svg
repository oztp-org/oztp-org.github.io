<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130" role="img" aria-label="Absolute Zero Advanced — Open Zero Trust Project">
  <title>Absolute Zero Advanced — Open Zero Trust Project</title>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <!-- Hexagon (flat-top) -->
  <polygon points="106.8,38 60,11 13.2,38 13.2,92 60,119 106.8,92"
           fill="#3F51B5" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <polygon points="99,42.5 60,20 21,42.5 21,87.5 60,110 99,87.5"
           fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- 0K monogram -->
  <text x="60" y="63" font-family="Georgia,'Times New Roman',serif" font-size="24"
        font-weight="bold" fill="white" text-anchor="middle">0K</text>
  <!-- Divider -->
  <line x1="35" y1="71" x2="85" y2="71" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- ABSOLUTE ZERO -->
  <text x="60" y="82" font-family="'DejaVu Sans',Verdana,Geneva,sans-serif" font-size="7.5"
        fill="white" text-anchor="middle" letter-spacing="1.2" font-weight="bold">ABSOLUTE ZERO</text>
  <!-- Tier -->
  <text x="60" y="95" font-family="'DejaVu Sans',Verdana,Geneva,sans-serif" font-size="7"
        fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.8">ADVANCED</text>
  <!-- OZTP -->
  <text x="60" y="108" font-family="'DejaVu Sans',Verdana,Geneva,sans-serif" font-size="6.5"
        fill="rgba(255,255,255,0.55)" text-anchor="middle">OZTP</text>
</svg>
